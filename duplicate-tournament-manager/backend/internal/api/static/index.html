<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Duplicate Tournament Manager</title>
    <style>
      :root { --cell-size: 24px; --gap: 2px; --header-h: 18px; --row-label-nudge: -2px; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; }
      .row { display: flex; gap: 1rem; align-items: center; margin-bottom: 0.5rem; }
      .grid { display: grid; grid-template-columns: repeat(15, var(--cell-size)); gap: var(--gap); margin-top: 0.25rem; }
      .cell { position: relative; width: var(--cell-size); height: var(--cell-size); box-sizing: border-box; background: #f2f2f2; border: 1px solid #ddd; font-size: 12px; display: flex; align-items: center; justify-content: center; }
      .cell.start { outline: none; }
      .cell .dir-arrow {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; line-height: 1; color: #3b82f6; font-weight: 600;
        pointer-events: none;
      }
      /* Bonus tags */
      .cell .bonus { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #333; opacity: 0.7; }
      .cell.tw { background: #fdd; }
      .cell.dw { background: #fce7f3; }
      .cell.tl { background: #dbeafe; }
      .cell.dl { background: #cffafe; }
      .cell.center .star { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #f59e0b; font-size: 14px; opacity: 0.9; }
      /* Occupied cell highlight (cream background) */
      .cell.occ { background: #fff4d6; }
      pre { background: #111; color: #0f0; padding: 0.5rem; max-height: 240px; overflow: auto; }
      input[type="text"] { padding: 0.25rem 0.5rem; }
      button { padding: 0.4rem 0.8rem; }
      .col { display: flex; flex-direction: column; gap: 0.5rem; }
      /* Rack tiles */
      .rack { display: flex; gap: 4px; align-items: center; }
      .tile { min-width: 24px; height: 24px; padding: 0 4px; border-radius: 3px; background: #fff; border: 1px solid #bbb; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; cursor: pointer; user-select: none; }
      .tile.digraph { min-width: 34px; }
      .tile.blank { color: #555; font-style: italic; }
      .tile.selected { outline: 2px solid #10b981; background: #e6fffa; }
      /* Coordinates (ES: filas letras, columnas números) */
      .coords-row { display: grid; grid-template-columns: repeat(15, var(--cell-size)); gap: var(--gap); height: var(--header-h); margin-top: 0.25rem; }
      .coords-col { display: grid; grid-template-rows: repeat(15, var(--cell-size)); gap: var(--gap); margin-right: 4px; }
      .coord { width: var(--cell-size); height: var(--header-h); font-size: 11px; color: #6b7280; display: flex; align-items: center; justify-content: center; user-select: none; }
      .coord.col { height: var(--cell-size); transform: translateY(var(--row-label-nudge)); }
      .coords-spacer { height: var(--header-h); }
    </style>
  </head>
  <body>
    <h1>Duplicate Tournament Manager (MVP)</h1>

    <h2>Partida vs Bot</h2>
    <div class="row">
      <button id="matchCreate">Nueva partida (Hasty)</button>
      <button id="matchCreateSim">Nueva partida (Sim)</button>
      <span id="matchInfo"></span>
    </div>
    <div class="row">
      <button id="matchShuffle">Shuffle Rack</button>
      <button id="matchRecall">Recall (ultimo)</button>
      <button id="matchRecallAll" title="Esc: devolver todas las fichas al atril">Recall (todos) (Esc)</button>
      <button id="matchPass">Pasar</button>
      <button id="matchExchange">Intercambiar</button>
      <input id="matchExchangeTiles" type="text" placeholder="Tiles a cambiar (ej: AE)" style="width:12rem"/>
      <button id="matchAIMove">AI mueve</button>
      <select id="matchAIMode"><option value="static">Hasty</option><option value="sim">Sim</option></select>
      <label>Orden rack
        <select id="matchRackOrder">
          <option value="none">— Orden —</option>
          <option value="alpha">Alfabético</option>
          <option value="vowels">Vocales primero</option>
          <option value="es">Español trad.</option>
          <option value="random">Aleatorio</option>
        </select>
      </label>
      <button id="matchSubmitPlay" title="Enviar jugada (Enter)">Jugar</button>
      <label style="display:flex;align-items:center;gap:4px"><input id="matchAutoAI" type="checkbox"/> Auto AI</label>
    </div>
    <div class="row">
      <label>KWG Preset
        <select id="matchKwgPreset">
          <option value="">— Auto —</option>
          <option value="FILE2017.kwg">FILE2017.kwg (repo root)</option>
          <option value="lexica/FILE2017.kwg">FILE2017.kwg (DUPMAN/lexica)</option>
          <option value="FISE2016_converted.kwg">FISE2016_converted.kwg (repo root)</option>
          <option value="/Users/isaacfalconer/DB_sources/gaddag/FISE2016_converted.kwg">FISE2016_converted.kwg (DB_sources)</option>
        </select>
      </label>
    </div>
    <div class="row">
      <div style="display:flex;flex-direction:column;margin-right:1px">
        <div class="coords-spacer"></div>
        <div class="coords-col" id="matchLeftCoords"></div>
      </div>
      <div style="display:flex;flex-direction:column">
        <div class="coords-row" id="matchTopCoords"></div>
        <div class="grid" id="matchBoard"></div>
        <div style="margin-top:4px;font-size:12px;color:#6b7280" title="Barra espaciadora: cambia dirección de tipeo">Inicio: <span id="matchCoordLabel">—</span></div>
      </div>
    </div>
    <div class="row">
      <div class="rack">Rack: <div id="matchRack" class="rack" style="margin-left:6px"></div></div>
      <div style="margin-left:1rem">Score: <span id="matchScore"></span> | Bolsa: <span id="matchBag"></span></div>
    </div>

    <div class="row" style="align-items:flex-start">
      <div style="flex:1">
        <h3 style="margin:6px 0 4px">Historial</h3>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
          <button id="matchHistoryRefresh">Actualizar historial</button>
          <small style="color:#6b7280">Se actualiza también tras cada jugada</small>
        </div>
        <div id="matchHistory" style="max-height:220px; overflow:auto; border:1px solid #e5e7eb; border-radius:4px"></div>
      </div>
    </div>

    <div class="row">
      <label>Name <input id="name" type="text" value="Torneo Demo" /></label>
      <label>Rules <input id="ruleset" type="text" value="OSPS49" /></label>
      <label>KWG <input id="kwg" type="text" placeholder="/absolute/path/to/your.kwg (optional)" style="width:28rem" /></label>
      <label>KWG Preset
        <select id="kwgPreset">
          <option value="">— Select —</option>
          <option value="/Users/isaacfalconer/DB_sources/gaddag/FISE2016_converted.kwg">FISE2016_converted.kwg (DB_sources)</option>
          <option value="FISE2016_converted.kwg">FISE2016_converted.kwg (repo root)</option>
          <option value="lexica/FILE2017.kwg">FILE2017.kwg (DUPMAN/lexica)</option>
          <option value="FILE2017.kwg">FILE2017.kwg (repo root)</option>
        </select>
      </label>
      <button id="create">Create Tournament</button>
    </div>

    <div class="row">
      <label>Player <input id="player" type="text" value="Ana" /></label>
      <button id="add">Add Player</button>
    </div>

    <div class="row">
      <label>Rack <input id="rack" type="text" value="AEIRST?" /></label>
      <button id="start">Start Round</button>
      <button id="close">Close Round</button>
    </div>

    <div class="row">
      <label>Move <input id="move" type="text" value="ARIEST" /></label>
      <button id="submit">Submit Move</button>
      <button id="standings">Standings</button>
    </div>

    <div class="row">
      <button id="refresh">Refresh Board</button>
      <button id="setBoard">Set Board</button>
      <button id="genMoves">Generate Moves</button>
      <label>Engine
        <select id="engine">
          <option value="macondo" selected>Macondo</option>
          <option value="wolges">Wolges</option>
          <option value="hybrid">Hybrid (Wolges + Macondo equity)</option>
        </select>
      </label>
      <label>Mode
        <select id="mode">
          <option value="static" selected>Static</option>
          <option value="sim">Simulation</option>
        </select>
      </label>
      <label>Top N <input id="topN" type="number" value="25" style="width:5rem" /></label>
    </div>
    <div class="row">
      <div style="display:flex;flex-direction:column;margin-right:1px">
        <div class="coords-spacer"></div>
        <div class="coords-col" id="leftCoords"></div>
      </div>
      <div style="display:flex;flex-direction:column">
        <div class="coords-row" id="topCoords"></div>
        <div class="grid" id="board"></div>
      </div>
    </div>
    <div class="row">
      <div class="col" style="flex:1">
        <label>Board rows (15 lines)</label>
        <textarea id="rows" rows="16" style="width:100%;font-family:monospace"></textarea>
      </div>
    </div>

    <h3>Output</h3>
    <pre id="out"></pre>

    <h3>Top Moves</h3>
    <div id="moves"></div>
    <div class="row">
      <button id="loadKLV2">Load KLV2</button>
      <span id="klv2Status">KLV2: not loaded</span>
    </div>

    <script>
      // ===== Partida vs Bot =====
      let matchId = null;
      let matchMode = 'static';
      let matchBoardEl = null;
      let matchBoardState = Array(225).fill(' ');
      let rackTokensArr = []; // current rack tokens (strings, bracket-aware)
      let rackCounts = {}; // token -> count
      let rackSelIdx = new Set(); // selected indices for exchange
      let pendingPlacements = {}; // boardIndex -> token placed from rack
      let startCell = null; // {row, col}
      let placeDir = 'H'; // H or V, toggles on subsequent clicks
      // small typing buffer to allow merging CH/LL/RR
      let pendingKey = null; // a single uppercase letter waiting to possibly merge
      let pendingKeyTimer = null;
      let matchBonusRows = null; // 15 strings from server with bonus codes
      let draggingKind = null; // 'rack' | 'board' | null

      function initMatchBoard() {
        if (!matchBoardEl) matchBoardEl = document.getElementById('matchBoard');
        // Render ES coordinates for match board
        renderCoords('match');
        matchBoardEl.innerHTML = '';
        matchBoardEl.style.gridTemplateColumns = 'repeat(15, 24px)';
        for (let i=0;i<225;i++){
          const d=document.createElement('div'); d.className='cell'; d.textContent='';
          // Allow dropping tiles from rack onto empty cells
          d.addEventListener('dragover', (ev)=>{ ev.preventDefault(); });
          d.addEventListener('drop', (ev)=>{
            ev.preventDefault(); ev.stopPropagation();
            const data = ev.dataTransfer?.getData('text/plain');
            try{
              const info = JSON.parse(data||'{}');
              if (!info) return;
              if (info.kind==='rack' && Number.isInteger(info.idx)){
                dropRackTokenAtCell(info.idx, i);
              } else if (info.kind==='board' && Number.isInteger(info.idx)){
                movePlacementOnBoard(info.idx, i);
              }
            }catch(_){ /* ignore */ }
          });
          d.addEventListener('click', ()=> onMatchCellClick(i));
          matchBoardEl.appendChild(d);
        }
        renderMatchBoard();
      }
      function renderCoords(prefix){
        const top = document.getElementById(prefix+"TopCoords");
        const left = document.getElementById(prefix+"LeftCoords");
        if (top){ top.innerHTML=''; for(let c=1;c<=15;c++){ const d=document.createElement('div'); d.className='coord'; d.textContent=String(c); top.appendChild(d);} }
        if (left){ left.innerHTML=''; for(let r=0;r<15;r++){ const d=document.createElement('div'); d.className='coord col'; d.textContent=String.fromCharCode(65+r); left.appendChild(d);} }
      }
      function toCoordES(row,col){ return String.fromCharCode(65+row) + String(col+1); }
      function bonusAtIndex(i){ if(!matchBonusRows) return null; const r=(i/15)|0, c=i%15; const row=matchBonusRows[r]||''; const ch=row.charAt(c)||' '; switch(ch){ case '-': return 'DW'; case '=': return 'TW'; case '"': return 'TL'; case "'": return 'DL'; case '~': return '4W'; case '^': return '4L'; default: return null; } }
      function renderMatchBoard(){
        const cells = matchBoardEl.children;
        const hasPending = Object.keys(pendingPlacements).length > 0;
        for(let i=0;i<225;i++){
          const tk = matchBoardState[i] || ' ';
          const placed = pendingPlacements[i];
          // reset main text
          cells[i].textContent = (placed || (tk && tk.trim() ? tk : ''));
          // Make newly placed tiles draggable; fixed tiles are not draggable
          if (placed){
            cells[i].draggable = true;
            cells[i].ondragstart = (ev)=>{ draggingKind='board'; ev.dataTransfer?.setData('text/plain', JSON.stringify({kind:'board', idx:i})); };
            cells[i].ondragend = ()=>{ draggingKind=null; };
          } else {
            cells[i].draggable = false;
            cells[i].ondragstart = null;
            cells[i].ondragend = null;
          }
          // remove any previous arrow
          const prev = cells[i].querySelector('.dir-arrow'); if (prev) prev.remove();
          cells[i].classList.remove('start');
          // remove previous bonus/star
          const prevB = cells[i].querySelector('.bonus'); if (prevB) prevB.remove();
          const prevS = cells[i].querySelector('.star'); if (prevS) prevS.remove();
          cells[i].classList.remove('tw','dw','tl','dl','center','occ');
          // add arrow on start cell (typing aid only). Hide once there is any pending placement or if occupied
          if (startCell && !hasPending){
            const si = startCell.row*15 + startCell.col;
            if (i === si && !(placed || (tk && tk.trim()))){
              cells[i].classList.add('start');
              const span = document.createElement('span');
              span.className = 'dir-arrow';
              span.textContent = (placeDir==='H' ? '→' : '↓');
              cells[i].appendChild(span);
            }
          }
          // show bonus tag and center star when empty
          const hasTile = !!(placed || (tk && tk.trim()));
          if (!hasTile){
            const r = (i/15)|0, c = i%15;
            if (r===7 && c===7){
              cells[i].classList.add('center');
              const st = document.createElement('span'); st.className='star'; st.textContent='★'; cells[i].appendChild(st);
            }
            const tag = bonusAtIndex(i);
            if (tag){
              if (tag==='TW') cells[i].classList.add('tw');
              else if (tag==='DW') cells[i].classList.add('dw');
              else if (tag==='TL') cells[i].classList.add('tl');
              else if (tag==='DL') cells[i].classList.add('dl');
              const b = document.createElement('span'); b.className='bonus'; b.textContent = tag; cells[i].appendChild(b);
            }
          } else {
            // Occupied cell: add cream background
            cells[i].classList.add('occ');
          }
        }
        // Update coordinate label for current start
        const lab = document.getElementById('matchCoordLabel');
        if (lab){
          if (startCell){ lab.textContent = toCoordES(startCell.row, startCell.col) + ' ' + (placeDir==='H'?'(→)':'(↓)'); }
          else { lab.textContent = '—'; }
        }
      }
      function setMatchInfo(t){ document.getElementById('matchInfo').textContent = t; }
      function tokenLabel(tk){
        if (!tk) return '';
        if (tk === '?') return '?';
        if (tk.startsWith('[') && tk.endsWith(']')) return tk.slice(1,-1); // CH/LL/RR or lowercase on blank
        return tk;
      }
      function renderRack(){
        const el = document.getElementById('matchRack');
        if (!el) return;
        el.innerHTML = '';
        // Enable dropping to rack container (append dragged tile at end)
        el.ondragover = (ev)=>{ ev.preventDefault(); };
        el.ondrop = (ev)=>{
          ev.preventDefault();
          const data = ev.dataTransfer?.getData('text/plain');
          try{
            const info = JSON.parse(data||'{}');
            if (!info) return;
            if (info.kind === 'rack' && Number.isInteger(info.idx)){
              const from = info.idx;
              if (from>=0 && from < rackTokensArr.length){
                const [item] = rackTokensArr.splice(from,1);
                rackTokensArr.push(item);
                rackSelIdx.clear(); rebuildRackCounts(); setMatchRackText();
              }
            } else if (info.kind === 'board' && Number.isInteger(info.idx)){
              const src = info.idx; const tk = pendingPlacements[src];
              if (tk){
                rackTokensArr.push(isPlacedBlankToken(tk) ? '?' : tk);
                delete pendingPlacements[src];
                rackSelIdx.clear(); rebuildRackCounts(); setMatchRackText(); renderMatchBoard();
              }
            }
          }catch(_){ /* ignore */ }
        };
        rackTokensArr.forEach((tk, idx)=>{
          const sp = document.createElement('span');
          const lbl = tokenLabel(tk);
          sp.className = 'tile' + ((lbl.length>1)?' digraph':'') + ((tk==='?')?' blank':'') + (rackSelIdx.has(idx)?' selected':'');
          sp.textContent = lbl.toUpperCase();
          sp.title = 'Click: ' + (startCell? 'colocar':'seleccionar para intercambio');
          // Drag-and-drop reorder and drag to board
          sp.setAttribute('draggable', 'true');
          sp.addEventListener('dragstart', (ev)=>{
            draggingKind = 'rack';
            ev.dataTransfer?.setData('text/plain', JSON.stringify({kind:'rack', idx}));
            try { ev.dataTransfer?.setDragImage(sp, 12, 12); } catch(_){ }
          });
          sp.addEventListener('dragend', ()=>{ draggingKind = null; });
          sp.addEventListener('dragover', (ev)=>{ ev.preventDefault(); });
          sp.addEventListener('drop', (ev)=>{
            ev.preventDefault(); ev.stopPropagation();
            const data = ev.dataTransfer?.getData('text/plain');
            try{
              const info = JSON.parse(data||'{}');
              if (!info) return;
              if (info.kind === 'rack' && Number.isInteger(info.idx)){
                const from = info.idx; const to = idx;
                if (from !== to && from>=0 && from<rackTokensArr.length){
                  const [item] = rackTokensArr.splice(from,1);
                  const insertAt = (from<to)? (to-1) : to;
                  rackTokensArr.splice(insertAt, 0, item);
                  rackSelIdx.clear(); rebuildRackCounts(); setMatchRackText();
                }
              } else if (info.kind === 'board' && Number.isInteger(info.idx)){
                // Swap pending tile from board into this rack slot
                const src = info.idx; const tk = pendingPlacements[src];
                if (tk){
                  const prevRack = rackTokensArr[idx];
                  rackTokensArr[idx] = isPlacedBlankToken(tk) ? '?' : tk;
                  pendingPlacements[src] = prevRack;
                  rackSelIdx.clear(); rebuildRackCounts(); setMatchRackText(); renderMatchBoard();
                }
              }
            }catch(_){ /* ignore */ }
          });
          sp.addEventListener('click', (ev)=>{
            if (draggingKind) { ev.preventDefault(); return; }
            if (startCell){
              tryPlaceToken(tk);
              return;
            }
            if (rackSelIdx.has(idx)) rackSelIdx.delete(idx); else rackSelIdx.add(idx);
            // Reflect into exchange input
            const tiles = Array.from(rackSelIdx).sort((a,b)=>a-b).map(i=>rackTokensArr[i]).join('');
            document.getElementById('matchExchangeTiles').value = tiles;
            renderRack();
          });
          el.appendChild(sp);
        });
      }
      function setMatchRackText(){ renderRack(); }
      function tokensFromBracketStr(s){
        const out=[]; s = s||''; let i=0; while(i<s.length){
          if(s[i]==='['){ const j=s.indexOf(']', i+1); if(j>i){ out.push(s.slice(i,j+1)); i=j+1; continue; } }
          out.push(s[i]); i++; }
        return out;
      }
      function rebuildRackCounts(){ rackCounts={}; for(const t of rackTokensArr){ rackCounts[t]=(rackCounts[t]||0)+1; } }
      function shuffleRack(){ for(let i=rackTokensArr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [rackTokensArr[i],rackTokensArr[j]]=[rackTokensArr[j],rackTokensArr[i]]; } rackSelIdx.clear(); rebuildRackCounts(); setMatchRackText(); }
      function isPlacedBlankToken(tk){
        if (!tk) return false;
        // Single-letter lowercase (including ñ) denotes blank assignment
        if (/^[a-zñ]$/.test(tk)) return true;
        // Lowercase digraph in brackets denotes blank as digraph
        if (/^\[(ch|ll|rr)\]$/.test(tk)) return true;
        return false;
      }
      function recallLast(){
        const keys = Object.keys(pendingPlacements).map(k=>parseInt(k)).sort((a,b)=>b-a);
        if(!keys.length) return;
        const last = keys[0];
        const tk = pendingPlacements[last];
        if (tk){ rackTokensArr.push(isPlacedBlankToken(tk) ? '?' : tk); rebuildRackCounts(); }
        delete pendingPlacements[last];
        renderMatchBoard(); rackSelIdx.clear(); setMatchRackText();
      }
      function recallAll(){
        for(const k in pendingPlacements){ const tk=pendingPlacements[k]; if(tk){ rackTokensArr.push(isPlacedBlankToken(tk) ? '?' : tk); } delete pendingPlacements[k]; }
        rebuildRackCounts(); renderMatchBoard(); rackSelIdx.clear(); setMatchRackText();
      }
      function onMatchCellClick(idx){
        const row=Math.floor(idx/15), col=idx%15;
        const occupied = !!((matchBoardState[idx]||' ').trim() || pendingPlacements[idx]);
        if (occupied) return; // indicator solo en celdas vacías
        if (!startCell || startCell.row!==row || startCell.col!==col){
          startCell={row,col}; // no cambia la dirección; se mantiene la intención actual
        } else {
          // clic repetido en la misma celda vacía: alterna dirección como comodidad
          placeDir = (placeDir==='H'?'V':'H');
        }
        renderMatchBoard();
      }
      function placedTokenForBlankAssignment(assign){
        if (!assign) return null;
        const up = assign.toUpperCase().trim();
        if (up === 'CH' || up === 'LL' || up === 'RR') return `[${up.toLowerCase()}]`;
        if (up.length === 1){
          if (up === 'Ñ') return 'ñ';
          if (up >= 'A' && up <= 'Z') return up.toLowerCase();
        }
        return null;
      }
      function dropRackTokenAtCell(rackIdx, cellIdx){
        if (rackIdx<0 || rackIdx>=rackTokensArr.length) return;
        if (cellIdx<0 || cellIdx>=225) return;
        // Only drop on empty board cells (no existing tile, no pending placement)
        if ((matchBoardState[cellIdx]||' ').trim()) return;
        let tk = rackTokensArr[rackIdx];
        let placeTk = tk;
        if (tk === '?'){
          const a = prompt('Asigna letra al comodín (A–Z, Ñ, CH, LL, RR):', 'A');
          const mapped = placedTokenForBlankAssignment(a||'');
          if (!mapped) return; // cancel invalid
          placeTk = mapped;
        }
        if (pendingPlacements[cellIdx]){
          // swap
          const prev = pendingPlacements[cellIdx];
          pendingPlacements[cellIdx] = placeTk;
          rackTokensArr.splice(rackIdx,1, prev);
        } else {
          pendingPlacements[cellIdx] = placeTk;
          // Remove from rack
          rackTokensArr.splice(rackIdx,1);
        }
        rackSelIdx.clear();
        rebuildRackCounts();
        // Do not move the typing indicator on DnD; it's for keyboard placement only.
        setMatchRackText();
        renderMatchBoard();
      }
      function movePlacementOnBoard(srcIdx, dstIdx){
        if (srcIdx===dstIdx) return;
        if (!pendingPlacements[srcIdx]) return;
        // Only move onto empty board cells (no fixed tile); allow swapping with another placement
        if ((matchBoardState[dstIdx]||' ').trim()) return;
        const srcTk = pendingPlacements[srcIdx];
        const dstTk = pendingPlacements[dstIdx];
        pendingPlacements[dstIdx] = srcTk;
        if (dstTk) pendingPlacements[srcIdx] = dstTk; else delete pendingPlacements[srcIdx];
        renderMatchBoard();
      }
      function mapInputToken(raw){
        // If already a bracket token like [CH], pass through
        if (typeof raw === 'string' && raw.startsWith('[') && raw.endsWith(']')) return raw;

          const eqNum = (engineEq!=null) ? engineEq : ((lvNum != null) ? (Number(m.score||0) + lvNum) : null);
          const wp = toNum(m.winPct);
          return { idx:i, score: Number(m.score||0), win: (wp!=null?wp:0), coord, dir:m.dir||'', word:normWord(m.word||''), leave, lv: lvNum, eq: eqNum };
        });
        // Sorting (default by score desc)
        const sortBy = ($('#sortBy')?.value)||'score';
        rowsArr.sort((a,b)=>{
          if (sortBy==='win') return ((b.win!=null?b.win:-1) - (a.win!=null?a.win:-1));
          if (sortBy==='equity') return ((b.eq!=null?b.eq:-1) - (a.eq!=null?a.eq:-1));
          if (sortBy==='leave') return ((b.lv!=null?b.lv:-1) - (a.lv!=null?a.lv:-1));
          return (b.score - a.score);
        });
        const rows = rowsArr.map((r,i)=>{
          let lvStr = (r.lv!=null) ? (typeof r.lv==='number' ? r.lv.toFixed(2) : String(r.lv)) : '';
          let eqStr = (r.eq!=null) ? (typeof r.eq==='number' ? r.eq.toFixed(2) : String(r.eq)) : '';
          // Prefer raw values from the original move if present (to avoid any client-side calc issues)
          const raw = all[r.idx] || {};
          const rawLV = Number.isFinite(Number(raw.leaveVal)) ? Number(raw.leaveVal) : null;
          const rawEQ = Number.isFinite(Number(raw.equity)) ? Number(raw.equity) : null;
          const rawWP = Number.isFinite(Number(raw.winPct)) ? Number(raw.winPct) : null;
          if (rawLV != null) lvStr = rawLV.toFixed(2);
          if (rawEQ != null) eqStr = rawEQ.toFixed(2);
          const winStr = (rawWP != null) ? rawWP.toFixed(2) : ((typeof r.win==='number') ? r.win.toFixed(2) : '');
          const leaveStr = (r.leave && r.leave.length) ? r.leave : '—';
          const btn = `<button data-idx="${r.idx}" onclick="applyMoveFromList(${(all[r.idx]||{}).row|0}, ${(all[r.idx]||{}).col|0}, '${(all[r.idx]||{}).dir||'H'}', '${normWord((all[r.idx]||{}).word||'').replace(/'/g, "\'")}')">Apply</button>`;
          return `<tr><td>${i+1}</td><td>${r.score}</td><td>${winStr}</td><td>${r.coord}</td><td>${r.dir}</td><td>${r.word}</td><td>${leaveStr}</td><td>${lvStr}</td><td>${eqStr}</td><td>${btn}</td></tr>`;
        }).join('');
        movesDiv.innerHTML = `<div class="row" style="margin:.5rem 0">
          <label>Sort by
            <select id="sortBy">
              <option value="score">Score</option>
              <option value="win">Win %</option>
              <option value="leave">Leave value</option>
              <option value="equity">Equity</option>
            </select>
          </label>
        </div>
        <table style="border-collapse:collapse;width:100%">
          <thead><tr><th>#</th><th>Score</th><th>Win%</th><th>Coord</th><th>Dir</th><th>Word</th><th>Leave</th><th>Leave Val</th><th>Equity</th><th></th></tr></thead>
          <tbody>${rows}</tbody></table>`;
      }

      $('#create').onclick = async () => {
        const res = await fetch('/tournaments', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
          name: $('#name').value, ruleset: $('#ruleset').value, lexicon_path: $('#kwg').value
        })});
        const j = await res.json(); tid = j.id; currentTournament = j; log(j); renderRows(j.board_rows);
      };
      $('#kwgPreset').onchange = () => {
        const v = $('#kwgPreset').value;
        if (!v) return;
        $('#kwg').value = v;
        // Set Spanish ruleset by default for these presets
        $('#ruleset').value = 'OSPS49';
      };
      $('#add').onclick = async () => {
        if (!tid) return log('Create tournament first');
        const res = await fetch(`/tournaments/${tid}/players`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name: $('#player').value })});
        const j = await res.json(); pid = j.id; log(j);
      };
      $('#start').onclick = async () => {
        if (!tid) return log('Create tournament first');
        const res = await fetch(`/tournaments/${tid}/rounds`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ rack: $('#rack').value })});
        const j = await res.json(); round = j.number; log(j);
      };
      $('#submit').onclick = async () => {
        if (!tid || !pid) return log('Create tournament and add player first');
        const mv = $('#move').value.trim().toUpperCase();
        const res = await fetch(`/tournaments/${tid}/rounds/${round}/submit`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ player_id: pid, move: {word: mv, row:7, col:7, dir:'H'}})});
        log(await res.json());
      };
      $('#close').onclick = async () => {
        if (!tid) return log('Create tournament first');
        const res = await fetch(`/tournaments/${tid}/rounds/${round}/close`, { method:'POST' });
        const j = await res.json(); log(j);
        await fetchTournament();
      };
      $('#refresh').onclick = fetchTournament;

      $('#setBoard').onclick = async () => {
        if (!tid) return log('Create tournament first');
        const raw = $('#rows').value.split(/\n/).map(s=>s.replace(/\r/g,''));
        if (raw.length !== 15) return log('Provide exactly 15 lines');
        const res = await fetch(`/tournaments/${tid}/board`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ rows: raw })});
        const j = await res.json(); log({event:'setBoard', ok:!j.error});
        await fetchTournament();
      };

      $('#genMoves').onclick = async () => {
        const rows = getRowsFromGrid();
        const rack = $('#rack').value.trim().toUpperCase();
        const rules = (currentTournament?.ruleset || $('#ruleset').value.trim() || 'NWL23');
        const kwg = (currentTournament?.lexicon_path || $('#kwg').value.trim() || '');
        const req = { board: { rows }, rack, ruleset: rules, kwg };
        const engine = ($('#engine')?.value||'macondo');
        const mode = ($('#mode')?.value||'static');
        if (mode === 'sim') {
          const topN = Math.max(1, Math.min(50, parseInt($('#topN').value||'25',10)||25));
          req.mode = 'sim';
          // Conservative defaults to avoid timeouts
          req.sim = { iters: 300, plies: 2, threads: 1, topK: Math.min(15, topN) };
        }
        const url = engine ? (`/moves?engine=${encodeURIComponent(engine)}`) : '/moves';
        const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(req)});
        const j = await res.json();
        // If KLV2 is ready, fetch leave values in batch
        if (klv2Ready && Array.isArray(j.all)) {
          await Promise.all(j.all.map(m=>new Promise((resolve)=>{
            const leave = (m.leave||'').toUpperCase();
            if (!leaveWorker || !leave) return resolve();
            const onMsg = (e)=>{
              const d=e.data||{}; if(d.type==='leaveValue:ok'){ m._leaveVal=d.payload.value; leaveWorker.removeEventListener('message', onMsg); resolve(); }
              if(d.type==='leaveValue:err'){ leaveWorker.removeEventListener('message', onMsg); resolve(); }
            };
            leaveWorker.addEventListener('message', onMsg);
            leaveWorker.postMessage({ type:'leaveValue', payload:{ leave } });
          })));
        }
        log(j); renderMovesList(j.all);
      };
      $('#loadKLV2').onclick = async () => {
        try{
          if(!leaveWorker){ leaveWorker = new Worker('/wolges-leave-worker.js'); }
          // ensure init, then load FILE2017.klv2 via /klv2 endpoint
          await new Promise((resolve)=>{
            const onMsg=(e)=>{ if((e.data||{}).type==='init:ok'){ leaveWorker.removeEventListener('message', onMsg); resolve(); } };
            leaveWorker.addEventListener('message', onMsg);
            leaveWorker.postMessage({ type:'init' });
          });
          await new Promise((resolve,reject)=>{
            const onMsg=(e)=>{ const d=e.data||{}; if(d.type==='loadKLV2:ok'){ leaveWorker.removeEventListener('message', onMsg); resolve(); } if(d.type==='loadKLV2:err'){ leaveWorker.removeEventListener('message', onMsg); reject(new Error(d.error||'failed')); } };
            leaveWorker.addEventListener('message', onMsg);
            leaveWorker.postMessage({ type:'loadKLV2', payload:{ url:'/klv2/FILE2017.klv2' } });
          });
          klv2Ready = true; $('#klv2Status').textContent = 'KLV2: loaded';
        }catch(err){ klv2Ready=false; $('#klv2Status').textContent = 'KLV2: error'; log(String(err)); }
      };

      // Auto-load KLV2 on page load for convenience
      window.addEventListener('load', () => { try { $('#loadKLV2').click(); } catch(_){} });
      $('#standings').onclick = async () => {
        if (!tid) return log('Create tournament first');
        const res = await fetch(`/tournaments/${tid}/standings`);
        log(await res.json());
      };
    </script>
  </body>
  </html>
